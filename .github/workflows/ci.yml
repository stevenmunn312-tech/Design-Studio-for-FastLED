name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r backend/requirements-dev.txt -c backend/constraints.txt

      - run: pytest backend/tests

  backend-install:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r backend/requirements.txt -c backend/constraints.txt

      - run: pip install -r backend/requirements-dev.txt -c backend/constraints.txt

      - run: pip install -r backend/requirements-packaging.txt -c backend/constraints.txt

      - run: pip check

      - run: python -c "import esptool, fastapi, httpx, multipart, pytest, serial, uvicorn, PyInstaller; print('backend + packaging deps ok')"

