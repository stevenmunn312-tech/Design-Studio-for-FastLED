name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".docs/**"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - ".docs/**"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - "LICENSE"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r backend/requirements-dev.txt -c backend/constraints.txt

      - run: pytest backend/tests
