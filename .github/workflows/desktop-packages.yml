name: Desktop Packages

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag to use if a draft pre-release is created
        required: true
        default: v0.2.0
        type: string
      create_draft_release:
        description: Create or update a draft GitHub pre-release after all builds pass
        required: true
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: desktop-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Package ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: windows-x86_64
            label: Windows
            runner: windows-latest
          - id: macos-native
            label: macOS
            runner: macos-latest
          - id: linux-x86_64
            label: Linux
            runner: ubuntu-22.04

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-packaging.txt
            backend/constraints.txt

      - name: Install frontend dependencies
        run: npm ci

      - name: Install desktop packaging dependencies
        run: python -m pip install -r backend/requirements-packaging.txt -c backend/constraints.txt

      - name: Build and launch-smoke desktop package
        run: npm run package:desktop

      - name: Write archive checksum
        run: >-
          python -c "from pathlib import Path; import hashlib;
          files = [p for p in Path('release/desktop').glob('FastLED-Studio-*') if p.is_file() and not p.name.endswith('.sha256')];
          assert len(files) == 1, f'expected one archive, found: {files}';
          p = files[0];
          p.with_name(p.name + '.sha256').write_text(f'{hashlib.sha256(p.read_bytes()).hexdigest()}  {p.name}\n', encoding='utf-8')"

      - name: Upload desktop archive
        uses: actions/upload-artifact@v4
        with:
          name: fastled-studio-${{ matrix.id }}
          path: |
            release/desktop/FastLED-Studio-*
          if-no-files-found: error
          retention-days: 14

  draft-release:
    name: Assemble draft pre-release
    needs: package
    if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.create_draft_release == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_tag }}

    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: fastled-studio-*
          path: release-assets
          merge-multiple: true

      - name: Assemble checksum manifest
        shell: bash
        run: |
          find release-assets -maxdepth 1 -type f -name '*.sha256' -print0 \
            | sort -z \
            | xargs -0 cat > release-assets/SHA256SUMS.txt

      - name: Create or update draft pre-release
        shell: bash
        run: |
          mapfile -t assets < <(find release-assets -maxdepth 1 -type f ! -name '*.sha256' -print | sort)
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --target "$GITHUB_SHA" \
              --title "FastLED Studio ${RELEASE_TAG#v}" \
              --generate-notes \
              --draft \
              --prerelease
          fi
