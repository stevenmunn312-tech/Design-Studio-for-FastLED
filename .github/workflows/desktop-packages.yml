name: Desktop Packages

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag to use if a draft pre-release is created
        required: true
        default: v0.2.0
        type: string
      create_draft_release:
        description: Create or update a draft GitHub pre-release after all builds pass
        required: true
        default: false
        type: boolean
      package_scope:
        description: Platforms to package
        required: true
        default: windows-only
        type: choice
        options:
          - all
          - windows-only
          - macos-arm64-only
          - macos-intel-only
          - macos-only
          - linux-only
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: desktop-packages-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'workflow_dispatch' }}

jobs:
  package:
    name: Package ${{ matrix.target }}
    runs-on: ${{ matrix.target == 'windows-x86_64' && 'windows-latest' || matrix.target == 'macos-arm64' && 'macos-15' || matrix.target == 'macos-x86_64' && 'macos-15-intel' || 'ubuntu-22.04' }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(inputs.package_scope == 'windows-only' && '["windows-x86_64"]' || inputs.package_scope == 'macos-arm64-only' && '["macos-arm64"]' || inputs.package_scope == 'macos-intel-only' && '["macos-x86_64"]' || inputs.package_scope == 'macos-only' && '["macos-arm64","macos-x86_64"]' || inputs.package_scope == 'linux-only' && '["linux-x86_64"]' || '["windows-x86_64","macos-arm64","macos-x86_64","linux-x86_64"]') }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-packaging.txt
            backend/constraints.txt

      - name: Install frontend dependencies
        run: npm ci

      - name: Install desktop packaging dependencies
        run: python -m pip install -r backend/requirements-packaging.txt -c backend/constraints.txt

      # fbuild 2.5.0's universal wheel contains unusable macOS executables:
      # dyld rejects the ARM binary and the Intel host receives the wrong CPU
      # slice. Cache the known-good source-built tools per architecture.
      - name: Restore source-built macOS fbuild tools
        id: fbuild-cache
        if: ${{ startsWith(matrix.target, 'macos-') }}
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/fbuild-v2.5.0/target/release/fbuild
            ${{ runner.temp }}/fbuild-v2.5.0/target/release/fbuild-daemon
          key: fbuild-v2.5.0-${{ matrix.target }}-66e2cb0b358cf06d30be88241d5cd4ca99ceda2f

      - name: Check out tagged fbuild source
        if: ${{ startsWith(matrix.target, 'macos-') && steps.fbuild-cache.outputs.cache-hit != 'true' }}
        shell: bash
        env:
          FBUILD_COMMIT: 66e2cb0b358cf06d30be88241d5cd4ca99ceda2f
        run: |
          source_dir="$RUNNER_TEMP/fbuild-v2.5.0"
          git clone --depth 1 --branch v2.5.0 https://github.com/FastLED/fbuild.git "$source_dir"
          test "$(git -C "$source_dir" rev-parse HEAD)" = "$FBUILD_COMMIT"

      - name: Build working fbuild tools from tagged source
        if: ${{ startsWith(matrix.target, 'macos-') && steps.fbuild-cache.outputs.cache-hit != 'true' }}
        shell: bash
        env:
          MACOSX_DEPLOYMENT_TARGET: "12.0"
        run: |
          source_dir="$RUNNER_TEMP/fbuild-v2.5.0"
          cargo build \
            --manifest-path "$source_dir/Cargo.toml" \
            --release \
            --locked \
            --package fbuild-cli \
            --package fbuild-daemon

      - name: Install source-built macOS fbuild tools
        if: ${{ startsWith(matrix.target, 'macos-') }}
        shell: bash
        run: |
          source_dir="$RUNNER_TEMP/fbuild-v2.5.0"
          for tool in fbuild fbuild-daemon; do
            install -m 755 "$source_dir/target/release/$tool" "$(command -v "$tool")"
            file "$(command -v "$tool")"
          done
          fbuild --version

      - name: Build and launch-smoke desktop package
        run: npm run package:desktop

      - name: Write archive checksum
        run: >-
          python -c "from pathlib import Path; import hashlib;
          files = [p for p in Path('release/desktop').glob('DesignStudioForFastLED-*') if p.is_file() and not p.name.endswith('.sha256')];
          assert len(files) == 1, f'expected one archive, found: {files}';
          p = files[0];
          p.with_name(p.name + '.sha256').write_text(f'{hashlib.sha256(p.read_bytes()).hexdigest()}  {p.name}\n', encoding='utf-8')"

      - name: Upload desktop archive
        uses: actions/upload-artifact@v4
        with:
          name: design-studio-for-fastled-${{ matrix.target }}
          path: |
            release/desktop/DesignStudioForFastLED-*
          if-no-files-found: error
          retention-days: 7

  draft-release:
    name: Assemble draft pre-release
    needs: package
    if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.create_draft_release == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_tag }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v5
        with:
          pattern: design-studio-for-fastled-*
          path: release-assets
          merge-multiple: true

      - name: Assemble checksum manifest
        shell: bash
        run: |
          find release-assets -maxdepth 1 -type f -name '*.sha256' -print0 \
            | sort -z \
            | xargs -0 cat > release-assets/SHA256SUMS.txt

      - name: Create or update draft pre-release
        shell: bash
        run: |
          mapfile -t assets < <(find release-assets -maxdepth 1 -type f ! -name '*.sha256' -print | sort)
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --target "$GITHUB_SHA" \
              --title "Design Studio for FastLED ${RELEASE_TAG#v}" \
              --generate-notes \
              --draft \
              --prerelease
          fi
