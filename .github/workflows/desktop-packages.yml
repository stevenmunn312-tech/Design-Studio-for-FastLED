name: Desktop Packages

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag to use if a draft pre-release is created
        required: true
        default: v0.2.0
        type: string
      create_draft_release:
        description: Create or update a draft GitHub pre-release after all builds pass
        required: true
        default: false
        type: boolean
      package_scope:
        description: Platforms to package (macOS-only is for release-pipeline diagnostics)
        required: true
        default: all
        type: choice
        options:
          - all
          - macos-only
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: desktop-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Package ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: windows-x86_64
            label: Windows
            runner: windows-latest
          # fbuild 2.5.0's universal wheel contains unusable macOS executables:
          # dyld rejects the ARM binary and the Intel host receives the wrong
          # CPU slice. The tagged source build below replaces both wheel tools.
          - id: macos-arm64
            label: macOS (Apple Silicon)
            runner: macos-15
            source_fbuild: true
          - id: macos-x86_64
            label: macOS (Intel/Rosetta)
            runner: macos-15-intel
            source_fbuild: true
          - id: linux-x86_64
            label: Linux
            runner: ubuntu-22.04

    steps:
      - uses: actions/checkout@v5
        if: ${{ inputs.package_scope != 'macos-only' || matrix.source_fbuild == true }}

      - uses: actions/setup-node@v5
        if: ${{ inputs.package_scope != 'macos-only' || matrix.source_fbuild == true }}
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        if: ${{ inputs.package_scope != 'macos-only' || matrix.source_fbuild == true }}
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-packaging.txt
            backend/constraints.txt

      - name: Install frontend dependencies
        if: ${{ inputs.package_scope != 'macos-only' || matrix.source_fbuild == true }}
        run: npm ci

      - name: Install desktop packaging dependencies
        if: ${{ inputs.package_scope != 'macos-only' || matrix.source_fbuild == true }}
        run: python -m pip install -r backend/requirements-packaging.txt -c backend/constraints.txt

      - name: Check out tagged fbuild source
        if: ${{ matrix.source_fbuild == true }}
        shell: bash
        env:
          FBUILD_COMMIT: 66e2cb0b358cf06d30be88241d5cd4ca99ceda2f
        run: |
          source_dir="$RUNNER_TEMP/fbuild-v2.5.0"
          git clone --depth 1 --branch v2.5.0 https://github.com/FastLED/fbuild.git "$source_dir"
          test "$(git -C "$source_dir" rev-parse HEAD)" = "$FBUILD_COMMIT"

      - name: Cache macOS fbuild compilation
        if: ${{ matrix.source_fbuild == true }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ runner.temp }}/fbuild-v2.5.0/target
          key: fbuild-v2.5.0-${{ matrix.id }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build working fbuild tools from tagged source
        if: ${{ matrix.source_fbuild == true }}
        shell: bash
        env:
          MACOSX_DEPLOYMENT_TARGET: "12.0"
        run: |
          source_dir="$RUNNER_TEMP/fbuild-v2.5.0"
          cargo build \
            --manifest-path "$source_dir/Cargo.toml" \
            --release \
            --locked \
            --package fbuild-cli \
            --package fbuild-daemon
          for tool in fbuild fbuild-daemon; do
            install -m 755 "$source_dir/target/release/$tool" "$(command -v "$tool")"
            file "$(command -v "$tool")"
          done
          fbuild --version

      - name: Build and launch-smoke desktop package
        if: ${{ inputs.package_scope != 'macos-only' || matrix.source_fbuild == true }}
        run: npm run package:desktop

      - name: Write archive checksum
        if: ${{ inputs.package_scope != 'macos-only' || matrix.source_fbuild == true }}
        run: >-
          python -c "from pathlib import Path; import hashlib;
          files = [p for p in Path('release/desktop').glob('FastLED-Studio-*') if p.is_file() and not p.name.endswith('.sha256')];
          assert len(files) == 1, f'expected one archive, found: {files}';
          p = files[0];
          p.with_name(p.name + '.sha256').write_text(f'{hashlib.sha256(p.read_bytes()).hexdigest()}  {p.name}\n', encoding='utf-8')"

      - name: Upload desktop archive
        if: ${{ inputs.package_scope != 'macos-only' || matrix.source_fbuild == true }}
        uses: actions/upload-artifact@v4
        with:
          name: fastled-studio-${{ matrix.id }}
          path: |
            release/desktop/FastLED-Studio-*
          if-no-files-found: error
          retention-days: 14

  draft-release:
    name: Assemble draft pre-release
    needs: package
    if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.create_draft_release == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_tag }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v5
        with:
          pattern: fastled-studio-*
          path: release-assets
          merge-multiple: true

      - name: Assemble checksum manifest
        shell: bash
        run: |
          find release-assets -maxdepth 1 -type f -name '*.sha256' -print0 \
            | sort -z \
            | xargs -0 cat > release-assets/SHA256SUMS.txt

      - name: Create or update draft pre-release
        shell: bash
        run: |
          mapfile -t assets < <(find release-assets -maxdepth 1 -type f ! -name '*.sha256' -print | sort)
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --target "$GITHUB_SHA" \
              --title "FastLED Studio ${RELEASE_TAG#v}" \
              --generate-notes \
              --draft \
              --prerelease
          fi
