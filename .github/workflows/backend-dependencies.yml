name: Backend Dependency Compatibility

on:
  push:
    branches: [main]
    paths:
      - "backend/requirements*.txt"
      - "backend/constraints.txt"
      - ".github/workflows/backend-dependencies.yml"
  pull_request:
    paths:
      - "backend/requirements*.txt"
      - "backend/constraints.txt"
      - ".github/workflows/backend-dependencies.yml"
  workflow_dispatch:

concurrency:
  group: backend-dependencies-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
            backend/requirements-packaging.txt
            backend/constraints.txt

      - run: pip install -r backend/requirements.txt -c backend/constraints.txt

      - run: pip install -r backend/requirements-dev.txt -c backend/constraints.txt

      - run: pip install -r backend/requirements-packaging.txt -c backend/constraints.txt

      - run: pip check

      - run: python -c "import esptool, fastapi, httpx, multipart, pytest, serial, uvicorn, PyInstaller; print('backend + packaging deps ok')"
